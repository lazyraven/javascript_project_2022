    The rest operator (...) in JavaScript is used to collect multiple values into a single variable. It’s the opposite of the spread operator.

        It gathers the remaining elements.

        const [first, ...rest] = [10, 20, 30, 40];

        console.log(first); // 10
        console.log(rest);  // [20, 30, 40]

      🔹 3. In Object Destructuring

            It collects remaining properties.

            const user = { name: "Nisha", age: 22, city: "Jaipur" };

            const { name, ...rest } = user;

            console.log(name); // "Nisha"
            console.log(rest); // { age: 22, city: "Jaipur" }

            Only one rest operator allowed per destructuring.

          | Feature | Rest (...)   | Spread (...) |
          | ------- | -------------- | -------------- |
          | Purpose | Collect values | Expand values  |

    import { useState, useEffect } from "react"; 

export default function Counter() { 
const [count, setCount] = useState(0); 

useEffect(() => { 
setInterval(() => {
 console.log(count); }, 1000); }, 
[]);

 return ( 
<button onClick={() => setCount(count + 1)}> {count} </button> ); }

 what is e wrong in this code ?

🔴 Problem
  Inside your useEffect, you wrote:
    setInterval(() => {
      console.log(count);
    }, 1000);
  But your dependency array is empty:
  useEffect(() => { ... }, []);

  This means the effect runs only once (on mount), and it captures the initial value of count (which is 0).
  So even when you click the button and update count, the interval still logs 0 forever.

  ⚠️ Also Missing Cleanup
   You're creating an interval but never clearing it, which can cause memory leaks.

   ✅ Fix Options
✔️ Option 1: Add count as dependency

This keeps interval updated with latest value:

useEffect(() => {
  const interval = setInterval(() => {
    console.log(count);
  }, 1000);

  return () => clearInterval(interval);
}, [count]);

👉 But note: this creates a new interval every time count changes.

If you just want to log when count changes:

(Simpler if just logging on change)
useEffect(() => {
  console.log(count);
}, [count]);

🧠 Key Concept

This issue happens because of:

JavaScript closures
React’s render cycle

Your interval "remembers" the old count.
