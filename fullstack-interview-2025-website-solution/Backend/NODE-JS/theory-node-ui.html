    question: "(Basic → Core Concept) - Why is Node.js single-threaded but still able to handle multiple requests efficiently?",
    definition: `Node.js is single-threaded but uses an event-driven architecture with a non-blocking I/O model.
    When a request involves operations like database access or file handling, 
    Node.js offloads those tasks to the system and registers a callback.
    Once the task is completed, the callback is placed in the event queue and executed by the event loop.
    This allows Node.js to handle multiple requests concurrently without creating multiple threads.

    ✔️ Easy Analogy (Use if needed)
            Think of it like a waiter in a restaurant:

            Takes order → sends to kitchen → moves to next table
            Doesn’t wait for food to be ready
            Comes back when food is done

    ✔️ Key Terms to Mention
        • Event Loop
        • Non-blocking I/O
        • Callback queue
        • Asynchronous processing

    ✔️ Bonus Tip (Impress Interviewer):

    ✔️ Common Mistake to Avoid
        ❌ Saying “Node.js handles everything in one thread”
        ✔️ Correct: It uses one main thread but offloads tasks internally  
  `

    question: "(This is very important) - What is Event Loop in Node.js?",
    definition: `The event loop is the core of Node.js asynchronous architecture. 
    It continuously monitors the call stack and callback queue.
    If the call stack is empty, it takes the first callback from the queue and pushes it to the stack for execution.
    This process allows Node.js to handle multiple asynchronous operations efficiently without blocking the main thread.

    ✔️ How It Works (Step-by-Step)
        1. Code runs → goes into Call Stack
        2. Async task (like API call, setTimeout) → sent to background
        3. Once completed → callback moves to Callback Queue
        4. Event loop checks:
        - If stack is empty → pushes callback to stack
        5.Executes callback

    ✔️ Important Queues in Node.js
       • Callback Queue (macrotasks)
       • Microtask Queue (Promises, process.nextTick)

👉 Microtasks run before callback queue (important detail)

    question: "(Basic → Important)- What is the difference between synchronous and asynchronous code?",
    definition: `In Node.js, synchronous code blocks the execution of the program until a task is completed, which can reduce performance.
    Asynchronous code, on the other hand, allows tasks like file reading, API calls, or database operations to run in the background,
    so the program can continue executing other code.
    This non-blocking behavior improves scalability and performance.

    🔴 Synchronous
            const data = fs.readFileSync("file.txt");
            console.log(data);
            console.log("Done");
       Execution waits until file is read

    🟢 Asynchronous
        fs.readFile("file.txt", (err, data) => {
            console.log(data);
        });
        console.log("Done");
        Output :Done
               (file content later)

  ✔️ Key Differences
    | Feature     | Synchronous   | Asynchronous
    |-------------|---------------|-------------
    | Execution   | Blocking      | Non-blocking
    | Performance | Slower        | Faster
    | Use Case    | Simple tasks  | I/O operations

  ✔️ When to Use What

        Use async → APIs, DB calls, file handling (most real apps)

    A Promise has 3 states:

        Fulfilled → Operation successful
        Rejected → Operation failed

            if (success) {

            } else {

    doTask1()

    function fetchData() {
        return new Promise((resolve) => {
            setTimeout(() => resolve("Data received"), 1000);
        });
    }

    async function getData() {
        const result = await fetchData();
        console.log(result);
    }

 ✔️ Error Handling (Important)

    Async/await improves readability, reduces chaining, and makes error handling easier using try...catch.

 ✔️ Example Comparison
    🔴 Using Promises
       fetchData()
            .then(data => processData(data))
            .then(result => console.log(result))
            .catch(err => console.error(err));

    🟢 Using Async/Await
        async function handleData() {
            try {
                const data = await fetchData();
                const result = await processData(data);
                console.log(result);
            } catch (err) {
                console.error(err);
            }
       }
| Feature        | Promises              | Async/Await      |
| -------------- | --------------------- | ---------------- |
| Syntax         | .then(), .catch()     | async, await     |
| Readability    | Medium                | High             |
| Error Handling | .catch()              | try...catch      |
| Code Structure | Chaining              | Sequential-like  |

     If any one promise fails, it immediately rejects with that error.

    const p1 = Promise.resolve("A");

    const p3 = Promise.resolve("C");

    Promise.all([p1, p2, p3])

    Output : ["A", "B", "C"]

✔️ Real Use Case (Important)

    ✅ Returns results in same order

    `
